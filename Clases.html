<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Clases</title>
</head>
<body>
	
	<script>

		class Player{
			constructor(nombre, color_sombrero){
				this.nombre = nombre;
				this.color_sombrero = color_sombrero;
			}

			saltar(){}
			correr(){}
			saludar(){
				return `Hola soy ${this.nombre} y mi sombrero es ${this.color_sombrero}`
			}

			// Obtener un atributo
			get nombre(){
				return this._nombre;
			}

			// Cambiar valor de un atributo
			set nombre(nuevo_nombre){
				this._nombre = nuevo_nombre;
			}
		}

		let player_1 = new Player('Mario', 'Rojo');
		let player_2 = new Player('Luigi', 'Verde');

		console.log(player_1);
		console.log(player_2);

		console.log(player_1.saludar());
		console.log(player_2.saludar());

		console.log(player_1.nombre);
		player_1.nombre = 'Alberto';
		console.log(player_1.nombre);

	</script>
</body>
</html>
